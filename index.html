/* ===== Tokens do design system Conecta AP (Ouro Premium on Deep Black) ===== */
:root{
  --primary:#C7A444; --primary-light:#E8B84B; --primary-dark:#9C7C21; --primary-hover:#C8A654;
  --primary-subtle:rgba(199,164,68,0.08);
  --background:#141412; --surface:#1E1E1C; --surface-light:#282826; --surface-elevated:#323230; --surface-alt:#1A1A18;
  --text:#F0F0F0; --text-secondary:#D0D0D0; --text-muted:#A0A0A0;
  --border:rgba(175,144,61,0.3); --border-light:rgba(255,255,255,0.1);
  --success:#28A745; --warning:#FFC107; --danger:#DC3545; --info:#17A2B8;
  --gradient-primary:linear-gradient(135deg,#C7A444 0%,#9C7C21 100%);
  --gradient-primary-hover:linear-gradient(135deg,#E8B84B 0%,#C7A444 100%);
  --glow-primary:0 0 20px rgba(199,164,68,0.25);
  --font-primary:'Montserrat','Segoe UI',Tahoma,sans-serif;
  --font-secondary:'Roboto','Segoe UI',Tahoma,sans-serif;
  --elevation-2:0 3px 6px rgba(0,0,0,0.16),0 3px 6px rgba(0,0,0,0.23);
  --elevation-3:0 10px 20px rgba(0,0,0,0.19),0 6px 6px rgba(0,0,0,0.23);
  --focus-ring:0 0 0 3px rgba(199,164,68,0.32);
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:var(--background);color:var(--text);font-family:var(--font-secondary);-webkit-font-smoothing:antialiased;}
input,select,button,textarea{font-family:'Roboto',sans-serif;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7) sepia(1) saturate(3) hue-rotate(5deg);cursor:pointer;}
button{font-family:var(--font-primary);}

.ms-icon{
  font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;font-size:24px;line-height:1;
  letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;
  -webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
}

@keyframes slideUpFade{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{width:18px;height:18px;border-radius:50%;border:2px solid rgba(26,26,24,0.35);border-top-color:#1A1A18;animation:spin .8s linear infinite;display:inline-block;}
.ms-icon.rot{animation:spin .9s linear infinite;}

/* Scrollbar */
*::-webkit-scrollbar{width:10px;height:10px;}
*::-webkit-scrollbar-track{background:transparent;}
*::-webkit-scrollbar-thumb{background:var(--surface-light);border-radius:10px;border:2px solid var(--background);}
*::-webkit-scrollbar-thumb:hover{background:#3a3a37;}

/* ===== Reutilizáveis ===== */
.inp{width:100%;height:44px;padding:0 12px;border-radius:8px;background:var(--surface-elevated);border:1px solid var(--border-light);color:var(--text);font:400 14px 'Roboto';outline:none;transition:border-color .15s,box-shadow .15s;}
.inp:focus{border-color:var(--primary);box-shadow:var(--focus-ring);}

.inp.lg{height:46px;font:500 15px 'Roboto';letter-spacing:.02em;}
select.inp{cursor:pointer;}
select.inp option{background:#1E1E1C;color:var(--text);}
.lbl{display:block;font:500 12px var(--font-primary);color:var(--text-secondary);margin-bottom:6px;}
.lbl.sm{font-size:11px;color:var(--text-muted);}
.card{background:var(--surface);border:1px solid var(--border-light);border-radius:14px;padding:22px;}
.sec-title{font:600 13px var(--font-primary);letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);}

/* Botões */
.btn-prim{display:flex;align-items:center;gap:8px;height:46px;padding:0 28px;border-radius:10px;border:none;cursor:pointer;background:var(--gradient-primary);color:#1A1A18;font:700 14px var(--font-primary);letter-spacing:.03em;box-shadow:0 4px 14px rgba(199,164,68,.3);transition:transform .2s,box-shadow .2s,opacity .2s;}
.btn-prim:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px rgba(199,164,68,.4);}
.btn-prim:disabled{background:var(--surface-light);color:var(--text-muted);cursor:not-allowed;opacity:.6;box-shadow:none;}

.btn-ghost:hover:not(:disabled){border-color:var(--primary);color:var(--primary);}
.btn-ghost:disabled{opacity:.5;cursor:not-allowed;}

/* Top bar */

.topbtn:hover{border-color:var(--primary);color:var(--primary);}

.cat-card.locked:hover{transform:none;border-color:var(--border-light);box-shadow:none;}

/* Linhas de produto */
.prod-row{text-align:left;cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;padding:20px 22px;border-radius:14px;background:var(--surface-elevated);border:1.5px solid var(--border-light);transition:border-color .22s,transform .22s,box-shadow .22s;width:100%;}
.prod-row:hover{transform:translateY(-2px);box-shadow:var(--elevation-2);}
.prod-row.sel{border-color:var(--primary);}

.chip{display:inline-flex;align-items:center;gap:5px;font:600 11.5px var(--font-primary);letter-spacing:.03em;color:var(--primary);background:var(--primary-subtle);border:1px solid rgba(199,164,68,.35);padding:4px 10px;border-radius:7px;}

.linkbtn{font:600 11px var(--font-primary);letter-spacing:.06em;text-transform:uppercase;color:var(--primary);background:none;border:none;cursor:pointer;}
.linkbtn:hover{text-decoration:underline;}

/* Layout */
.scrollarea{flex:1;overflow-y:auto;}
.flow-grid{max-width:1240px;margin:0 auto;padding:32px 28px 48px;display:grid;grid-template-columns:minmax(0,1fr) 372px;gap:28px;align-items:start;}
.sticky{position:sticky;top:24px;}

@media (max-width:980px){
  .flow-grid{grid-template-columns:1fr;}
  .sticky{position:static;}
  .lobby-grid{grid-template-columns:1fr !important;}
}
@media (max-width:560px){
  .topbar{padding:0 16px !important;gap:12px !important;}
  .who{display:none !important;}
}

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================================
 * INTEGRAÇÕES REAIS — copiadas da página de pré-contrato (shared.jsx) que está
 * no ar em pre-registro.seja-alta-performance.workers.dev. São EXATAMENTE os
 * mesmos webhooks n8n (CNPJ, CEP e cadastro de cliente), com o mesmo contrato de
 * payload, para que o backend continue funcionando sem ajustes.
 * ========================================================================== */

// ===== Webhooks (n8n) =====
const CNPJ_WEBHOOK_URL = 'https://n8n.sejaap.com.br/webhook/brasilapi-cnpj';
const CEP_WEBHOOK_URL  = 'https://n8n.sejaap.com.br/webhook/busca-cep';
const SEND_WEBHOOK_URL = 'https://n8n.sejaap.com.br/webhook/onboarding-cliente-elite';
// Cobrança Pix da entrada: gera o QR e, por polling (acao:status), confirma o pagamento.
const PIX_WEBHOOK_URL  = 'https://n8n.sejaap.com.br/webhook/907bbfb8-b366-4f1e-9871-9cc4ba98c5e9';

// ===== Máscaras =====
const maskCNPJ = (v) => {
  v = v.replace(/\D/g, '').slice(0, 14);
  return v
    .replace(/^(\d{2})(\d)/, '$1.$2')
    .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
    .replace(/\.(\d{3})(\d)/, '.$1/$2')
    .replace(/(\d{4})(\d)/, '$1-$2');
};
const maskCPF = (v) => {
  v = v.replace(/\D/g, '').slice(0, 11);
  return v
    .replace(/^(\d{3})(\d)/, '$1.$2')
    .replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3')
    .replace(/\.(\d{3})(\d)/, '.$1-$2');
};
const maskCEP = (v) => { v = v.replace(/\D/g, '').slice(0, 8); return v.replace(/^(\d{5})(\d)/, '$1-$2'); };
const maskPhone = (v) => {
  v = v.replace(/\D/g, '').slice(0, 11);
  if (v.length <= 10) return v.replace(/^(\d{2})(\d{4})(\d)/, '($1) $2-$3').replace(/^(\d{2})(\d)/, '($1) $2');
  return v.replace(/^(\d{2})(\d{5})(\d)/, '($1) $2-$3').replace(/^(\d{2})(\d)/, '($1) $2');
};
const onlyDigits = (v) => String(v || '').replace(/\D/g, '');

// ===== Validadores =====
function isCPF(v) {
  const d = onlyDigits(v);
  if (d.length !== 11 || /^(\d)\1{10}$/.test(d)) return false;
  const n = d.split('').map(Number);
  let s = 0; for (let i = 0; i < 9; i++) s += n[i] * (10 - i);
  let f = 11 - (s % 11); if (f >= 10) f = 0; if (f !== n[9]) return false;
  s = 0; for (let i = 0; i < 10; i++) s += n[i] * (11 - i);
  let g = 11 - (s % 11); if (g >= 10) g = 0; return g === n[10];
}
function isCNPJ(v) {
  const d = onlyDigits(v);
  if (d.length !== 14 || /^(\d)\1{13}$/.test(d)) return false;
  const n = d.split('').map(Number);
  const w1 = [5,4,3,2,9,8,7,6,5,4,3,2]; let s = 0;
  for (let i = 0; i < 12; i++) s += n[i] * w1[i];
  let f = s % 11; f = f < 2 ? 0 : 11 - f; if (f !== n[12]) return false;
  const w2 = [6,5,4,3,2,9,8,7,6,5,4,3,2]; s = 0;
  for (let i = 0; i < 13; i++) s += n[i] * w2[i];
  let g = s % 11; g = g < 2 ? 0 : 11 - g; return g === n[13];
}
const isCEP = (v) => onlyDigits(v).length === 8;
const isEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((v || '').trim());
const isPhone = (v) => { const n = onlyDigits(v); return n.length === 10 || n.length === 11; };
const UFS = ['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'];
const isUF = (v) => UFS.includes(String(v || '').toUpperCase());
const maskUF = (v) => String(v || '').replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 2);

function composeEndereco(d) {
  if (!d) return '';
  const head = [d.endereco, d.numero].map((s) => String(s || '').trim()).filter(Boolean).join(', ');
  const cidadeUf = [d.cidade, d.estado].map((s) => String(s || '').trim()).filter(Boolean).join('/');
  return [head, d.complemento, d.bairro, cidadeUf].map((s) => String(s || '').trim()).filter(Boolean).join(' - ');
}

// ===== Moeda / números =====
const fmtBRL = (n) => 'R$ ' + Number(n || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtMoneyPlain = (n) => Number(n || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const round2 = (n) => Math.round((Number(n) + Number.EPSILON) * 100) / 100;
function parseMoney(v) {
  if (typeof v === 'number') return v;
  let s = String(v == null ? '' : v).trim().replace(/[^\d.,-]/g, '');
  if (!s) return NaN;
  const hasComma = s.indexOf(',') > -1, hasDot = s.indexOf('.') > -1;
  if (hasComma && hasDot) s = s.replace(/\./g, '').replace(',', '.');
  else if (hasComma) s = s.replace(',', '.');
  return Number(s);
}

// ===== Datas =====
const pad2 = (n) => String(n).padStart(2, '0');
const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; };
function addMonthsISO(iso, n) {
  const p = String(iso || todayISO()).split('-').map(Number);
  const dt = new Date(p[0], (p[1] - 1) + n, 1);
  const last = new Date(dt.getFullYear(), dt.getMonth() + 1, 0).getDate();
  dt.setDate(Math.min(p[2], last));
  return `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`;
}

// ===== Formas de pagamento =====
const PAYMENT_METHODS = [
  { id: 'pix',            label: 'Pix' },
  { id: 'cartao_credito', label: 'Cartão de crédito' },
  { id: 'cartao_debito',  label: 'Cartão de débito' },
  { id: 'boleto',         label: 'Boleto' },
  { id: 'permuta',        label: 'Permuta' },
  { id: 'link_pagamento', label: 'Link de pagamento' },
  { id: 'recorrencia',    label: 'Recorrência' },
];
const paymentLabel = (id) => { const m = PAYMENT_METHODS.find((x) => x.id === id); return m ? m.label : '—'; };

// ===== Cronograma (total âncora + redistribuição automática) =====
function redistributeSchedule(parcelas, total, entrada) {
  const arr = (parcelas || []).map((p) => Object.assign({}, p));
  const freeIdx = arr.map((p, i) => (p.manual ? -1 : i)).filter((i) => i >= 0);
  if (freeIdx.length === 0) return arr;
  const manualSum = arr.filter((p) => p.manual).reduce((s, p) => s + (Number(p.valor) || 0), 0);
  const residual = round2((Number(total) || 0) - (Number(entrada) || 0) - manualSum);
  const per = round2(residual / freeIdx.length);
  let acc = 0;
  freeIdx.forEach((idx, k) => {
    if (k < freeIdx.length - 1) { arr[idx].valor = per; acc = round2(acc + per); }
    else { arr[idx].valor = round2(residual - acc); }
  });
  return arr;
}
function buildSchedule(count, total, entrada, startISO) {
  const n = Math.max(1, Math.round(Number(count) || 1));
  const start = startISO || todayISO();
  const arr = Array.from({ length: n }, (_, i) => ({ valor: 0, data: addMonthsISO(start, i + 1), forma: 'pix', manual: false }));
  return redistributeSchedule(arr, total, entrada);
}
function scheduleTotal(entrada, parcelas) {
  const sum = (parcelas || []).reduce((s, p) => s + (Number(p.valor) || 0), 0);
  return round2((Number(entrada) || 0) + sum);
}

// ===== Normalização das respostas dos webhooks de CNPJ / CEP =====
const UF_BY_NAME = {
  'acre':'AC','alagoas':'AL','amapa':'AP','amazonas':'AM','bahia':'BA','ceara':'CE','distrito federal':'DF',
  'espirito santo':'ES','goias':'GO','maranhao':'MA','mato grosso':'MT','mato grosso do sul':'MS','minas gerais':'MG',
  'para':'PA','paraiba':'PB','parana':'PR','pernambuco':'PE','piaui':'PI','rio de janeiro':'RJ','rio grande do norte':'RN',
  'rio grande do sul':'RS','rondonia':'RO','roraima':'RR','santa catarina':'SC','sao paulo':'SP','sergipe':'SE','tocantins':'TO',
};
const stripAccents = (s) => String(s || '').normalize('NFD').replace(new RegExp('[\\u0300-\\u036f]', 'g'), '');
function pickStr(v, prefer) {
  if (v == null) return '';
  if (typeof v === 'object' && !Array.isArray(v)) {
    const keys = (prefer || []).concat(['sigla','nome','descricao','descrição','text','name','value','label']);
    for (const k of keys) { const inner = v[k]; if (inner != null && typeof inner !== 'object' && String(inner).trim() !== '') return String(inner).trim(); }
    return '';
  }
  return String(v).trim();
}
function normalizeCnpjResponse(raw) {
  if (!raw) return null;
  if (Array.isArray(raw)) raw = raw[0] || {};
  if (typeof raw !== 'object') return null;
  const sources = []; const push = (o) => { if (o && typeof o === 'object' && !Array.isArray(o)) sources.push(o); };
  push(raw);
  ['data','result','empresa','estabelecimento','endereco','address'].forEach((k) => push(raw[k]));
  ['estabelecimento','endereco','address'].forEach((k) => { push(raw.data && raw.data[k]); push(raw.empresa && raw.empresa[k]); push(raw.estabelecimento && raw.estabelecimento[k]); });
  const get = (keys, prefer) => { for (const src of sources) for (const k of keys) if (src[k] != null) { const s = pickStr(src[k], prefer); if (s) return s; } return ''; };
  const razaoSocial = get(['razao_social','razaoSocial','razão_social','razao social','nome','nome_empresarial','company']);
  let inscricaoEstadual = get(['inscricao_estadual','inscricaoEstadual','ie']); if (/^isento$/i.test(inscricaoEstadual)) inscricaoEstadual = 'ISENTO';
  const cepRaw = onlyDigits(get(['cep','CEP','codigo_postal']));
  const cep = cepRaw.length === 8 ? cepRaw.replace(/^(\d{5})(\d{3})$/, '$1-$2') : '';
  let logradouro = get(['logradouro','rua','street','tipo_logradouro_logradouro']);
  const numero = get(['endereco_numero','numero_endereco','numero','número','number','nro','num','numero_fachada']);
  const complemento = get(['complemento','complement']);
  const bairro = get(['bairro','neighborhood','distrito']);
  const cidade = get(['municipio','município','cidade','city','localidade'], ['nome']);
  let estado = get(['uf','estado','state','sigla_uf'], ['sigla']);
  if (estado.length > 2) { const m = UF_BY_NAME[stripAccents(estado).toLowerCase().trim()]; if (m) estado = m; }
  if (estado.length === 2) estado = estado.toUpperCase();
  if (!logradouro) logradouro = get(['endereco','endereço','endereco_completo','logradouro_completo']);
  return { razaoSocial, inscricaoEstadual, logradouro, numero, complemento, bairro, cidade, estado, cep };
}
async function fetchCnpj(cnpjMasked) {
  const cnpj = onlyDigits(cnpjMasked);
  if (cnpj.length !== 14) throw new Error('CNPJ inválido');
  let res;
  try {
    res = await fetch(CNPJ_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify({ cnpj, cnpj_formatado: cnpjMasked }), mode: 'cors' });
  } catch (e) { throw new Error('Não foi possível consultar o CNPJ'); }
  if (!res.ok) throw new Error('Não foi possível consultar o CNPJ');
  let raw = null; try { raw = await res.json(); } catch { raw = null; }
  const data = normalizeCnpjResponse(raw);
  if (!data || !data.razaoSocial) throw new Error('CNPJ não encontrado');
  return data;
}
function normalizeCepResponse(raw) {
  if (!raw) return null;
  if (Array.isArray(raw)) raw = raw[0] || {};
  if (typeof raw !== 'object') return null;
  const sources = []; const push = (o) => { if (o && typeof o === 'object' && !Array.isArray(o)) sources.push(o); };
  push(raw); ['data','result','endereco','address'].forEach((k) => push(raw[k]));
  const get = (keys, prefer) => {
    for (const src of sources) {
      const lowerMap = {};
      for (const realKey of Object.keys(src)) { const lk = realKey.toLowerCase(); if (!(lk in lowerMap)) lowerMap[lk] = src[realKey]; }
      for (const k of keys) { const cand = lowerMap[k.toLowerCase()]; if (cand != null) { const s = pickStr(cand, prefer); if (s) return s; } }
    } return '';
  };
  const erro = get(['erro','error']); if (erro && erro !== 'false') return null;
  const logradouro = get(['logradouro','rua','street','endereco','endereço']);
  const complemento = get(['complemento','complement']);
  const bairro = get(['bairro','neighborhood','distrito']);
  const cidade = get(['localidade','municipio','município','cidade','city'], ['nome']);
  let estado = get(['uf','estado','state','sigla_uf'], ['sigla']);
  if (estado.length > 2) { const m = UF_BY_NAME[stripAccents(estado).toLowerCase().trim()]; if (m) estado = m; }
  if (estado.length === 2) estado = estado.toUpperCase();
  const cepRaw = onlyDigits(get(['cep','CEP','codigo_postal']));
  const cep = cepRaw.length === 8 ? cepRaw.replace(/^(\d{5})(\d{3})$/, '$1-$2') : '';
  return { logradouro, complemento, bairro, cidade, estado, cep };
}
async function fetchCep(cepMasked) {
  const cep = onlyDigits(cepMasked);
  if (cep.length !== 8) throw new Error('CEP inválido');
  let res;
  try {
    res = await fetch(CEP_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify({ cep, cep_formatado: cepMasked }), mode: 'cors' });
  } catch (e) { throw new Error('Não foi possível consultar o CEP'); }
  if (!res.ok) throw new Error('Não foi possível consultar o CEP');
  let raw = null; try { raw = await res.json(); } catch { raw = null; }
  const data = normalizeCepResponse(raw);
  if (!data || (!data.cidade && !data.logradouro)) throw new Error('CEP não encontrado');
  return data;
}
function extractWebhookError(body) {
  if (!body) return null;
  const item = Array.isArray(body) ? body[0] : body;
  if (!item || typeof item !== 'object') return null;
  if (item.faultstring || item.error_type) return { message: item.faultstring || 'Não foi possível concluir o envio.', errorType: item.error_type || null };
  return null;
}
async function sendPreContrato(payload) {
  let res;
  try {
    res = await fetch(SEND_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify(payload), mode: 'cors' });
  } catch (e) { throw new Error('Falha de conexão ao enviar o cadastro'); }
  let body = null; try { body = await res.json(); } catch { body = null; }
  const errInfo = extractWebhookError(body);
  if (errInfo) { const err = new Error(errInfo.message); err.handled = true; err.errorType = errInfo.errorType; throw err; }
  if (!res.ok) throw new Error(`Erro ao enviar (HTTP ${res.status})`);
  return body || {};
}

// ===== Cobrança Pix da entrada =====
// Gera a imagem do QR a partir do código copia-e-cola (EMV) com qrcode-generator.
function emvToDataUrl(text) {
  try {
    if (typeof qrcode === 'undefined') return '';
    const qr = qrcode(0, 'M');
    qr.addData(String(text));
    qr.make();
    return qr.createDataURL(6, 10);
  } catch (e) { return ''; }
}
// Busca (case-insensitive) a primeira chave preenchida entre a raiz e contêineres
// aninhados comuns — o webhook n8n pode devolver vários formatos.
function pixGet(raw, keys) {
  let r = raw;
  if (Array.isArray(r)) r = r[0] || {};
  const sources = [];
  const push = (o) => { if (o && typeof o === 'object' && !Array.isArray(o)) sources.push(o); };
  push(r);
  ['data', 'result', 'resultado', 'response', 'body', 'pix', 'charge', 'cobranca', 'payment', 'pagamento', 'qrcode', 'qr_code'].forEach((k) => push(r && r[k]));
  for (const src of sources) {
    const lower = {};
    for (const k of Object.keys(src)) { const lk = k.toLowerCase(); if (!(lk in lower)) lower[lk] = src[k]; }
    for (const key of keys) {
      const v = lower[key.toLowerCase()];
      if (v != null && typeof v !== 'object' && String(v).trim() !== '') return String(v).trim();
    }
  }
  return '';
}
// Estados que significam PAGO (não inclui "pendente", "ativa", "aguardando" etc.).
const PIX_PAID_WORDS = ['pago', 'paga', 'paid', 'approved', 'aprovado', 'aprovada', 'concluido', 'concluído', 'concluida', 'concluída', 'recebido', 'recebida', 'received', 'liquidado', 'liquidada', 'settled', 'confirmado', 'confirmada', 'completed', 'complete', 'done', 'sucesso', 'success', 'ok', 'finalizado', 'finalizada'];
// Normaliza a resposta do webhook Pix em { qrImg, copiaCola, txid, paid }.
function normalizePixResponse(raw) {
  const emv = pixGet(raw, ['pix_copia_cola', 'copia_cola', 'copiaecola', 'pixcopiaecola', 'copia_e_cola', 'copyandpastecode', 'copy_and_paste_code', 'emv', 'brcode', 'br_code', 'qrcode_text', 'pixcode', 'pix_code', 'payload']);
  const base64 = pixGet(raw, ['qr_base64', 'qrcode_base64', 'qr_code_base64', 'imagemqrcode', 'imagem_qrcode', 'qr_image_base64', 'qrcodebase64', 'imagem', 'base64']);
  const url = pixGet(raw, ['qr_url', 'qrcode_url', 'qr_code_url', 'qr_image_url', 'image_url', 'url_qrcode', 'qrimage']);
  const generic = pixGet(raw, ['qrcode', 'qr_code', 'qr', 'qr_image']);
  const txid = pixGet(raw, ['txid', 'tx_id', 'orderid', 'order_id', 'paymentid', 'payment_id', 'pedido_id', 'transaction_id', 'transactionid', 'identificador', 'reference', 'referencia', 'correlationid', 'e2eid', 'cobranca_id', 'charge_id', 'id']);

  const statusRaw = pixGet(raw, ['status', 'situacao', 'situação', 'payment_status', 'state', 'resultado', 'evento', 'event', 'eventname', 'event_name', 'message', 'mensagem']).toLowerCase();
  // ATENÇÃO: NÃO usar "success" como sinal de pago — em alguns webhooks (ex.: Stark)
  // success=true significa "requisição ok", não "pagamento concluído".
  const paidBool = /^(true|1|sim|yes|paid|pago)$/i.test(pixGet(raw, ['pago', 'paid', 'confirmado', 'is_paid', 'ispaid', 'ispaidevent', 'is_paid_event']));
  const paid = paidBool || PIX_PAID_WORDS.indexOf(statusRaw) >= 0;

  let qrImg = '', copiaCola = emv || '';
  const decide = (val) => {
    if (!val || qrImg) return;
    if (/^data:image\//i.test(val)) qrImg = val;
    else if (/^https?:\/\//i.test(val)) qrImg = val;
    else if (/^[A-Za-z0-9+/=\s]+$/.test(val) && val.length > 120 && !/^0002/.test(val)) qrImg = 'data:image/png;base64,' + val.replace(/\s+/g, '');
    else if (!copiaCola) copiaCola = val;
  };
  decide(base64); decide(url); decide(generic);
  return { qrImg, copiaCola, txid, paid };
}

function MoneyInput({ value, onChangeNumber, disabled, placeholder, className }) {
  const [focused, setFocused] = useState(false);
  const [buf, setBuf] = useState('');
  const num = Number(value);
  const hasNum = Number.isFinite(num);
  const display = focused ? buf : (hasNum ? fmtMoneyPlain(num) : '');
  return (
    <input
      className={className || 'inp'} type="text" inputMode="decimal" disabled={disabled} placeholder={placeholder}
      value={display}
      onFocus={() => { setFocused(true); setBuf(hasNum ? fmtMoneyPlain(num) : ''); }}
      onBlur={() => setFocused(false)}
      onChange={(e) => { const t = e.target.value; setBuf(t); const p = parseMoney(t); onChangeNumber(Number.isFinite(p) ? p : NaN, t); }}
    />
  );
}

    omie: true, conecta: true,
    sendState: 'idle', sendErr: '', sendErrHandled: false, protocol: '', response: null,
    pixState: 'idle', pixQrImg: '', pixCopiaCola: '', pixTxid: '', pixErr: '', pixCopied: false,
  });
  const patch = (o) => setS((prev) => ({ ...prev, ...(typeof o === 'function' ? o(prev) : o) }));
  const scrollRef = useRef(null);
  const pixTimer = useRef(null);   // setTimeout do polling
  const pixStop = useRef(false);   // sinaliza para o polling parar
  const pixBase = useRef(null);    // payload de geração (reutilizado no polling, evita closure stale)
  const pixTxidRef = useRef('');   // txid devolvido na geração
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTo({ top: 0, behavior: 'smooth' }); }, [s.step, s.screen]);

  // Espelha o endereço da empresa no representante quando "mesmo endereço".
  useEffect(() => {
    if (s.repMesmoEndereco) patch((d) => ({ repEndereco: composeEndereco(d) }));
  }, [s.repMesmoEndereco, s.endereco, s.numero, s.complemento, s.bairro, s.cidade, s.estado]);

  const cat = getCat(s.catId);
  const colors = cat ? COLORS[cat.color] : COLORS.gold;
  const product = s.product;

  // ----- Navegação -----
  const goLobby = () => patch({ screen: 'lobby' });
  const onCategory = (id) => patch({ screen: 'flow', step: 0, catId: id, product: null });
  const onProduct = (p) => patch({ product: p, priceEdit: false, unitValue: p.recurring ? p.monthly : p.price, ...initPayment(p) });
  const next = () => patch((d) => ({ step: Math.min(3, d.step + 1) }));
  const back = () => { if (s.step === 0) patch({ screen: 'lobby' }); else patch((d) => ({ step: d.step - 1 })); };
  const goStep = (i) => patch({ step: i });

  // ----- Campos -----
  const onField = (k, v) => {
    if (k === 'cnpj') v = maskCNPJ(v);
    else if (k === 'repCpf') v = maskCPF(v);
    else if (k === 'repTelefone') v = maskPhone(v);
    else if (k === 'cep') v = maskCEP(v);
    else if (k === 'estado') v = maskUF(v);
    const extra = {};
    if (k === 'cnpj') { extra.cnpjStatus = 'idle'; extra.cnpjErr = ''; }
    if (k === 'cep') extra.cepStatus = 'idle';
    patch({ [k]: v, ...extra });
  };

  // ----- CNPJ (webhook real) -----
  const validateCnpj = async () => {
    if (!isCNPJ(s.cnpj) || s.cnpjStatus === 'loading') { if (!isCNPJ(s.cnpj)) patch({ cnpjStatus: 'error', cnpjErr: 'CNPJ inválido' }); return; }
    patch({ cnpjStatus: 'loading', cnpjErr: '' });
    try {
      const r = await fetchCnpj(s.cnpj);
      patch((d) => ({
        cnpjStatus: 'done',
        razaoSocial: r.razaoSocial || d.razaoSocial,
        inscricaoEstadual: r.inscricaoEstadual || d.inscricaoEstadual,
        endereco: r.logradouro || d.endereco, numero: r.numero || d.numero, complemento: r.complemento || d.complemento,
        bairro: r.bairro || d.bairro, cidade: r.cidade || d.cidade, estado: r.estado || d.estado, cep: r.cep || d.cep,
      }));
    } catch (e) {
      // Permite preenchimento manual mesmo se a consulta falhar.
      patch({ cnpjStatus: 'manual', cnpjErr: 'Não foi possível consultar. Preencha manualmente.' });
    }
  };

  // ----- CEP (webhook real) -----
  const validateCep = async () => {
    if (!isCEP(s.cep) || s.cepStatus === 'loading') return;
    patch({ cepStatus: 'loading' });
    try {
      const r = await fetchCep(s.cep);
      patch((d) => ({ cepStatus: 'done', endereco: r.logradouro || d.endereco, complemento: r.complemento || d.complemento, bairro: r.bairro || d.bairro, cidade: r.cidade || d.cidade, estado: r.estado || d.estado, cep: r.cep || d.cep }));
    } catch (e) { patch({ cepStatus: 'error' }); }
  };

  // ----- Pagamento (total âncora derivado do valor EDITÁVEL do produto) -----
  // unitValue = mensalidade (produtos recorrentes) ou valor à vista (eventos).
  const unitValue = Number(s.unitValue) || 0;
  const total = product ? (product.recurring ? round2(unitValue * (product.vigencia || 12)) : unitValue) : 0;
  const setEntradaValor = (n) => patch((d) => ({ entradaValor: Number.isFinite(n) ? n : 0, parcelas: redistributeSchedule(d.parcelas, total, Number.isFinite(n) ? n : 0) }));
  const setEntradaForma = (v) => patch({ entradaForma: v });
  const setEntradaData = (v) => patch({ entradaData: v });
  const setCount = (raw) => patch((d) => {
    const n = Math.max(1, Math.min(60, Math.round(Number(raw) || 1)));
    const start = todayISO();
    const arr = Array.from({ length: n }, (_, i) => d.parcelas[i] ? { ...d.parcelas[i] } : { valor: 0, data: addMonthsISO(start, i + 1), forma: 'pix', manual: false });
    return { parcelas: redistributeSchedule(arr, total, Number(d.entradaValor)) };
  });
  const incParcela = () => { if (s.editMode) setCount(s.parcelas.length + 1); };
  const decParcela = () => { if (s.editMode) setCount(s.parcelas.length - 1); };
  const setParcelaValor = (idx, n) => patch((d) => { const arr = d.parcelas.map((p, i) => i === idx ? { ...p, valor: Number.isFinite(n) ? n : 0, manual: true } : { ...p }); return { parcelas: redistributeSchedule(arr, total, Number(d.entradaValor)) }; });
  const setParcelaData = (idx, iso) => patch((d) => ({ parcelas: d.parcelas.map((p, i) => i === idx ? { ...p, data: iso } : p) }));
  const setParcelaForma = (idx, forma) => patch((d) => ({ parcelas: d.parcelas.map((p, i) => i === idx ? { ...p, forma } : p) }));
  const unlockParcela = (idx) => patch((d) => { const arr = d.parcelas.map((p, i) => i === idx ? { ...p, manual: false } : { ...p }); return { parcelas: redistributeSchedule(arr, total, Number(d.entradaValor)) }; });
  const resetSchedule = () => patch((d) => { const arr = d.parcelas.map((p) => ({ ...p, manual: false })); return { parcelas: redistributeSchedule(arr, total, Number(d.entradaValor)) }; });
  const toggleEdit = () => { if (s.editMode) patch({ editMode: false, ...initPayment(product) }); else patch({ editMode: true }); };

  // ----- Edição do VALOR do produto (mensalidade / valor à vista) -----
  // Ao alterar o valor, o cronograma volta ao padrão (entrada + 11 parcelas) sobre o novo total.
  const rebuildDefault = (newTotal) => {
    const entrada = product.recurring ? round2(newTotal / (product.vigencia || 12)) : round2(newTotal / 12);
    return { entradaValor: entrada, parcelas: buildSchedule(11, newTotal, entrada, todayISO()), editMode: false };
  };
  const setUnitValue = (n) => patch(() => {
    const val = Number.isFinite(n) ? n : 0;
    const newTotal = product.recurring ? round2(val * (product.vigencia || 12)) : val;
    return { unitValue: val, ...rebuildDefault(newTotal) };
  });
  const togglePriceEdit = () => patch((d) => {
    if (d.priceEdit) { // desligar: volta ao valor de tabela do produto
      const unit = product.recurring ? product.monthly : product.price;
      return { priceEdit: false, unitValue: unit, ...rebuildDefault(product.price) };
    }
    return { priceEdit: true };
  });
  const valorTabela = product ? (product.recurring ? product.monthly : product.price) : 0;

  // Conferência da soma
  const parcelasSum = s.parcelas.reduce((a, p) => a + (Number(p.valor) || 0), 0);
  const soma = round2((Number(s.entradaValor) || 0) + parcelasSum);
  const diff = round2(total - soma);
  const balanced = Math.abs(diff) < 0.01;
  const parcelasUniformes = s.parcelas.length > 0 && s.parcelas.every((p) => Math.abs((Number(p.valor) || 0) - (Number(s.parcelas[0].valor) || 0)) < 0.005);

  // ----- Gating -----
  const empresaValid = (
    isCNPJ(s.cnpj) &&
    (s.razaoSocial || '').trim().length > 3 &&
    (s.endereco || '').trim().length > 2 &&
    (s.numero || '').trim().length > 0 &&
    (s.bairro || '').trim().length > 1 &&
    (s.cidade || '').trim().length > 1 &&
    isUF(s.estado) && isCEP(s.cep) &&
    (s.repNome || '').trim().length > 3 &&
    (!(s.repCpf || '').trim() || isCPF(s.repCpf)) &&
    (s.repMesmoEndereco || (s.repEndereco || '').trim().length > 5) &&
    isPhone(s.repTelefone) && isEmail(s.repEmail)
  );
  const pagamentoValid = (s.omie || s.conecta) && balanced;

  // ----- Payload + envio (reusa sendPreContrato → SEND_WEBHOOK_URL) -----
  const buildPayload = () => {
    const nowIso = new Date().toISOString();
    const formas = Array.from(new Set([s.entradaForma].concat(s.parcelas.map((p) => p.forma))));
    return {
      origem: 'lobby_conecta_ap',
      etapa: 'envio_pre_contrato',
      empresa: {
        cnpj: s.cnpj || '', cnpj_limpo: onlyDigits(s.cnpj), razao_social: (s.razaoSocial || '').trim(),
        inscricao_estadual: (s.inscricaoEstadual || '').trim() || null, endereco: composeEndereco(s),
        logradouro: (s.endereco || '').trim(), numero: (s.numero || '').trim(), complemento: (s.complemento || '').trim() || null,
        bairro: (s.bairro || '').trim(), cidade: (s.cidade || '').trim(), estado: (s.estado || '').toUpperCase(), cep: s.cep || '',
      },
      representante: {
        nome: (s.repNome || '').trim(), nascimento: s.repNascimento || null, cpf: s.repCpf || '', cpf_limpo: onlyDigits(s.repCpf),
        endereco: (s.repEndereco || '').trim(), mesmo_endereco_empresa: !!s.repMesmoEndereco,
        telefone: s.repTelefone || '', telefone_limpo: onlyDigits(s.repTelefone), email: (s.repEmail || '').trim(),
      },
      produto: {
        id: product ? product.id : '', nome: product ? product.name : '',
        categoria_id: cat ? cat.id : '', categoria: cat ? cat.name : '',
        valor_mensal: product && product.recurring ? round2(Number(s.unitValue) || 0) : (parcelasUniformes && s.parcelas[0] ? round2(s.parcelas[0].valor) : null),
        valor_tabela: product ? (product.recurring ? product.monthly : product.price) : null,
        valor_editado: product ? (round2(Number(s.unitValue) || 0) !== round2(product.recurring ? product.monthly : product.price)) : false,
        entrada: round2(Number(s.entradaValor) || 0), parcelas: s.parcelas.length,
        vigencia_meses: product && product.vigencia ? product.vigencia : 12,
        valor_total: soma, valores_negociados: !!(s.editMode || s.priceEdit),
        entrada_detalhe: { valor: round2(Number(s.entradaValor) || 0), forma: s.entradaForma, forma_label: paymentLabel(s.entradaForma), data: s.entradaData || null },
        cronograma: s.parcelas.map((p, i) => ({ numero: i + 1, valor: round2(Number(p.valor) || 0), vencimento: p.data || null, forma: p.forma, forma_label: paymentLabel(p.forma) })),
      },
      pagamento: { forma: 'personalizado', formas, pix_txid: s.pixTxid || null, entrada_pix_paga: s.entradaForma === 'pix' ? (s.pixState === 'paid') : null },
      destino: { omie: !!s.omie, conecta: !!s.conecta, sistemas: [s.omie ? 'omie' : null, s.conecta ? 'conecta' : null].filter(Boolean) },
      aceites: { pre_contrato: true, lgpd: true, aceito_em: nowIso },
      metadata: { user_agent: navigator.userAgent, url: location.href, enviado_em: nowIso, canal: 'lobby_conecta_ap' },
    };
  };

  const finalize = async () => {
    if (!pagamentoValid || s.sendState === 'sending') return;
    patch({ sendState: 'sending', sendErr: '', sendErrHandled: false });
    try {
      const response = await sendPreContrato(buildPayload());
      const r = response || {};
      const fromApi = r.protocolo || r.protocol || r.id || r.protocolo_id || r.protocoloId;
      const proto = fromApi ? String(fromApi) : ('CAP-' + new Date().getFullYear() + '-' + Math.floor(100000 + Math.random() * 899999));
      patch({ screen: 'success', response: r, protocol: proto, sendState: 'idle' });
    } catch (e) {
      patch({ sendState: 'error', sendErr: e && e.message ? e.message : 'Erro ao enviar. Tente novamente.', sendErrHandled: !!(e && e.handled) });
    }
  };

  const restart = () => { stopPixPolling(); patch({
    screen: 'lobby', step: 0, catId: null, product: null,
    cnpj: '', cnpjStatus: 'idle', cnpjErr: '',
    razaoSocial: '', inscricaoEstadual: '', endereco: '', numero: '', complemento: '', bairro: '', cidade: '', estado: '', cep: '', cepStatus: 'idle',
    repNome: '', repNascimento: '', repCpf: '', repMesmoEndereco: true, repEndereco: '', repEmail: '', repTelefone: '',
    priceEdit: false, unitValue: 0, editMode: false, entradaForma: 'pix', entradaValor: 0, entradaData: '', parcelas: [],
    omie: true, conecta: true, sendState: 'idle', sendErr: '', sendErrHandled: false, protocol: '', response: null,
    pixState: 'idle', pixQrImg: '', pixCopiaCola: '', pixTxid: '', pixErr: '', pixCopied: false,
  }); };

  // ===== Fluxo de cobrança Pix da entrada =====
  // Payload de geração (reutilizado no polling). Inclui valor da entrada, dados do
  // cliente e endereço — campos pedidos pelo fluxo n8n.
  const buildPixPayload = () => ({
    origem: 'lobby_conecta_ap',
    forma_pagamento: s.entradaForma,                       // hoje sempre 'pix' (só Pix libera esta cobrança)
    forma_pagamento_label: paymentLabel(s.entradaForma),
    valor: round2(Number(s.entradaValor) || 0),
    valor_centavos: Math.round((Number(s.entradaValor) || 0) * 100),
    cnpj: s.cnpj || '',
    cnpj_limpo: onlyDigits(s.cnpj),
    razao_social: (s.razaoSocial || '').trim(),
    email: (s.repEmail || '').trim(),
    telefone: s.repTelefone || '',
    telefone_limpo: onlyDigits(s.repTelefone),
    endereco: {
      cep: s.cep || '',
      logradouro: (s.endereco || '').trim(),
      numero: (s.numero || '').trim(),
      complemento: (s.complemento || '').trim() || null,
      bairro: (s.bairro || '').trim(),
      cidade: (s.cidade || '').trim(),
      estado: (s.estado || '').toUpperCase(),
    },
  });
  const postPix = async (extra) => {
    const res = await fetch(PIX_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ ...(pixBase.current || buildPixPayload()), ...extra }),
      mode: 'cors',
    });
    let raw = null; try { raw = await res.json(); } catch { raw = null; }
    if (!res.ok && !raw) throw new Error('HTTP ' + res.status);
    return normalizePixResponse(raw);
  };
  const stopPixPolling = () => { pixStop.current = true; if (pixTimer.current) { clearTimeout(pixTimer.current); pixTimer.current = null; } };
  const pollPix = async () => {
    if (pixStop.current) return;
    try {
      const n = await postPix({ acao: 'status', txid: pixTxidRef.current, orderId: pixTxidRef.current, order_id: pixTxidRef.current });
      if (pixStop.current) return;
      if (n.paid) { stopPixPolling(); patch({ pixState: 'paid' }); return; }
    } catch (e) { /* erro transitório — segue tentando */ }
    if (!pixStop.current) pixTimer.current = setTimeout(pollPix, 4000);
  };
  const generatePix = async () => {
    if (s.pixState === 'generating') return;
    stopPixPolling();
    pixStop.current = false;
    pixBase.current = buildPixPayload();
    pixTxidRef.current = '';
    patch({ pixState: 'generating', pixErr: '', pixQrImg: '', pixCopiaCola: '', pixTxid: '' });
    try {
      const n = await postPix({ acao: 'gerar' });
      if (n.paid) { patch({ pixState: 'paid' }); return; }
      if (!n.qrImg && !n.copiaCola) throw new Error('O webhook não retornou o QR Code.');
      const qrImg = n.qrImg || emvToDataUrl(n.copiaCola);
      pixTxidRef.current = n.txid || '';
      patch({ pixState: 'awaiting', pixQrImg: qrImg, pixCopiaCola: n.copiaCola, pixTxid: n.txid });
      pixStop.current = false;
      pixTimer.current = setTimeout(pollPix, 4000);
    } catch (e) {
      patch({ pixState: 'error', pixErr: (e && e.message) ? e.message : 'Erro ao gerar o Pix' });
    }
  };
  const checkPixNow = () => { if (pixTimer.current) { clearTimeout(pixTimer.current); pixTimer.current = null; } pixStop.current = false; pollPix(); };
  const cancelPix = () => { stopPixPolling(); patch({ pixState: 'idle', pixQrImg: '', pixCopiaCola: '', pixTxid: '', pixErr: '' }); };
  const copyPix = () => {
    const t = s.pixCopiaCola; if (!t) return;
    const done = () => { patch({ pixCopied: true }); setTimeout(() => patch({ pixCopied: false }), 1800); };
    try { (navigator.clipboard ? navigator.clipboard.writeText(t) : Promise.reject()).then(done, done); } catch (e) { done(); }
  };
  // Cancela/zera o Pix se a entrada (valor ou forma) mudar; e ao desmontar.
  useEffect(() => {
    stopPixPolling();
    patch((d) => (d.pixState !== 'idle' ? { pixState: 'idle', pixQrImg: '', pixCopiaCola: '', pixTxid: '', pixErr: '' } : {}));
  }, [s.entradaValor, s.entradaForma]);
  useEffect(() => () => stopPixPolling(), []);

  const destinoChips = [s.omie ? 'Omie' : null, s.conecta ? 'Conecta' : null].filter(Boolean);
  const destinoText = s.omie && s.conecta ? 'Omie e Conecta' : s.omie ? 'Omie' : s.conecta ? 'Conecta' : 'nenhum sistema';
  const sending = s.sendState === 'sending';

  /* ======================= RENDER HELPERS ======================= */

  const renderStepper = () => (
    <div style={{ flexShrink: 0, padding: '18px 28px', borderBottom: '1px solid var(--border-light)', background: 'var(--surface-alt)' }}>
      <div style={{ maxWidth: 760, margin: '0 auto', display: 'flex', alignItems: 'center' }}>
        {STEPS.map((label, i) => {
          const state = i < s.step ? 'done' : i === s.step ? 'active' : 'todo';
          const circle = state === 'active'
            ? { background: 'var(--gradient-primary)', color: '#1A1A18', borderColor: 'transparent', boxShadow: '0 4px 12px rgba(199,164,68,.35)' }
            : state === 'done' ? { background: 'rgba(199,164,68,.15)', color: 'var(--primary)', borderColor: 'var(--primary)' }
            : { background: 'var(--surface-light)', color: 'var(--text-muted)', borderColor: 'var(--border-light)' };
          return (
            <div key={i} style={{ display: 'flex', alignItems: 'center', flex: i === 0 ? '0 0 auto' : 1 }}>
              {i !== 0 && <div style={{ flex: 1, height: 2, borderRadius: 2, margin: '0 6px 20px', background: i <= s.step ? 'var(--primary)' : 'var(--border-light)' }} />}
              <button onClick={() => i < s.step && goStep(i)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, background: 'none', border: 'none', cursor: i < s.step ? 'pointer' : 'default', minWidth: 88 }}>
                <div style={{ width: 36, height: 36, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', font: '700 14px var(--font-primary)', border: '1.5px solid', transition: 'all .25s', ...circle }}>
                  {state === 'done' ? <span className="ms-icon" style={{ fontSize: 19 }}>check</span> : i + 1}
                </div>
                <div style={{ font: '600 11.5px var(--font-primary)', letterSpacing: '.03em', whiteSpace: 'nowrap', color: state === 'todo' ? 'var(--text-muted)' : 'var(--text)' }}>{label}</div>
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );

  const renderLobby = () => (
    <div style={{ minHeight: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '48px 28px' }}>
      <div className="lobby-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 20, width: '100%', maxWidth: 1040 }}>
        {CATS.map((c, i) => {
          const col = COLORS[c.color];
          const locked = !!c.locked;
          return (
            <button key={c.id} className={`cat-card ${locked ? 'locked' : ''}`} style={{ animationDelay: (i * 80) + 'ms' }}
              onClick={() => { if (!locked) onCategory(c.id); }} disabled={locked} aria-disabled={locked}>
              {!locked && <div style={{ position: 'absolute', right: -34, bottom: -34, width: 150, height: 150, borderRadius: '50%', opacity: .08, background: col.orb }} />}
              {!locked && <div style={{ position: 'absolute', top: 0, left: '10%', right: '10%', height: 1, background: 'linear-gradient(90deg,transparent,rgba(199,164,68,.45),transparent)' }} />}
              <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 22 }}>
                <div style={{ width: 54, height: 54, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', background: locked ? 'var(--surface-light)' : col.iconBg, color: locked ? 'var(--text-muted)' : col.iconFg }}>
                  <span className="ms-icon" style={{ fontSize: 28 }}>{c.icon}</span>
                </div>
                {!locked && <span style={{ font: '600 11px var(--font-primary)', letterSpacing: '.04em', color: 'var(--text-muted)', border: '1px solid var(--border-light)', padding: '5px 9px', borderRadius: 7 }}>{c.products.length} produtos</span>}
              </div>
              <div style={{ font: '700 20px var(--font-primary)', letterSpacing: '-.01em', color: 'var(--text)', marginBottom: 7 }}>{c.name}</div>
              <div style={{ font: '400 13.5px/1.55 var(--font-secondary)', color: 'var(--text-secondary)', marginBottom: 20, minHeight: 42 }}>{c.desc}</div>
              {locked ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 7, font: '600 12px var(--font-primary)', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>
                  <span className="ms-icon" style={{ fontSize: 18 }}>lock</span> Em implementação
                </div>
              ) : (
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, font: '600 12px var(--font-primary)', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--primary)' }}>
                  Ver produtos <span className="ms-icon" style={{ fontSize: 18 }}>arrow_forward</span>
                </div>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );

  const renderProduto = () => (
    <>
      <div style={{ marginBottom: 24 }}>
        <span style={{ font: '600 11px var(--font-primary)', letterSpacing: '.1em', textTransform: 'uppercase', color: colors.iconFg }}>{cat.name}</span>
        <h2 style={{ font: '700 26px var(--font-primary)', letterSpacing: '-.02em', margin: '6px 0 6px', color: 'var(--text)' }}>Selecione o produto a contratar</h2>
        <p style={{ font: '400 14px var(--font-secondary)', color: 'var(--text-muted)', margin: 0 }}>Escolha o item desta categoria que será vendido ao cliente.</p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {cat.products.map((p) => {
          const sel = product && product.id === p.id;
          const effTotal = sel ? total : p.price;
          const effMonthly = sel && p.recurring ? unitValue : p.monthly;
          return (
            <button key={p.id} className={`prod-row ${sel ? 'sel' : ''}`} onClick={() => onProduct(p)}>
              <div style={{ width: 46, height: 46, borderRadius: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--primary-subtle)', color: 'var(--primary)' }}>
                <span className="ms-icon" style={{ fontSize: 24 }}>{p.icon}</span>
              </div>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ font: '600 16px var(--font-primary)', color: 'var(--text)' }}>{p.name}</span>
                  {sel && <span className="chip"><span className="ms-icon" style={{ fontSize: 13 }}>check</span>Selecionado</span>}
                </div>
                <div style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-muted)', marginTop: 4 }}>{p.desc} · {p.duration}</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ font: '700 18px var(--font-primary)', color: 'var(--primary)', letterSpacing: '-.01em', whiteSpace: 'nowrap' }}>{fmt(effTotal)}</div>
                <div style={{ font: '400 11px var(--font-secondary)', color: 'var(--text-muted)', marginTop: 2 }}>{p.recurring ? `${fmt(effMonthly)}/mês` : 'à vista'}</div>
              </div>
            </button>
          );
        })}
      </div>

      {/* Editor do valor do produto — varia por evento/negociação */}
      {product && (
        <div className="card" style={{ marginTop: 16, padding: '18px 22px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span className="ms-icon" style={{ fontSize: 20, color: 'var(--primary)' }}>sell</span>
              <div>
                <div className="sec-title" style={{ fontSize: 13, letterSpacing: '.06em' }}>{product.recurring ? 'Valor da mensalidade' : 'Valor do produto'}</div>
                <div style={{ font: '400 12px var(--font-secondary)', color: 'var(--text-muted)', marginTop: 2 }}>O valor pode variar por evento/negociação — habilite para ajustar.</div>
              </div>
            </div>
            <EditToggle on={s.priceEdit} onToggle={togglePriceEdit} label="Editar valor" />
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 18, marginTop: 16, flexWrap: 'wrap' }}>
            <div style={{ minWidth: 200 }}>
              <label className="lbl sm">{product.recurring ? 'Mensalidade (R$)' : 'Valor à vista (R$)'}</label>
              <div style={{ display: 'flex', alignItems: 'center', height: 44, borderRadius: 8, background: 'var(--surface-elevated)', border: '1px solid ' + (s.priceEdit ? 'rgba(199,164,68,.45)' : 'var(--border-light)'), padding: '0 12px', gap: 6, opacity: s.priceEdit ? 1 : .7 }}>
                <span style={{ font: "600 13px 'Roboto'", color: 'var(--text-muted)' }}>R$</span>
                <MoneyInput className="" value={s.unitValue} onChangeNumber={setUnitValue} disabled={!s.priceEdit} placeholder="0,00" />
              </div>
            </div>
            <div style={{ font: '400 13.5px var(--font-secondary)', color: 'var(--text-secondary)', paddingBottom: 11 }}>
              {product.recurring
                ? <>× {product.vigencia || 12} meses = <strong style={{ color: 'var(--text)' }}>{fmt(total)}</strong></>
                : <>Total do contrato = <strong style={{ color: 'var(--text)' }}>{fmt(total)}</strong></>}
            </div>
          </div>
          {round2(unitValue) !== round2(valorTabela) && (
            <div style={{ marginTop: 10, display: 'inline-flex', alignItems: 'center', gap: 6, font: '500 11.5px var(--font-secondary)', color: 'var(--primary)' }}>
              <span className="ms-icon" style={{ fontSize: 15 }}>edit</span>
              Valor ajustado · tabela: {fmt(valorTabela)}{product.recurring ? '/mês' : ''}
            </div>
          )}
        </div>
      )}
    </>
  );

  const renderEmpresa = () => {
    const cnpjBtnLabel = s.cnpjStatus === 'loading' ? 'Buscando…' : s.cnpjStatus === 'done' ? 'Revalidar' : 'Validar CNPJ';
    return (
      <>
        <div style={{ marginBottom: 22 }}>
          <h2 style={{ font: '700 26px var(--font-primary)', letterSpacing: '-.02em', margin: '0 0 6px', color: 'var(--text)' }}>Dados do cliente</h2>
          <p style={{ font: '400 14px var(--font-secondary)', color: 'var(--text-muted)', margin: 0 }}>Informe o CNPJ para buscar os dados da empresa automaticamente.</p>
        </div>

        {/* CNPJ */}
        <div className="card" style={{ marginBottom: 18 }}>
          <div className="sec-title" style={{ marginBottom: 14 }}>Identificação</div>
          <div style={{ display: 'flex', gap: 12, alignItems: 'flex-end', flexWrap: 'wrap' }}>
            <div style={{ flex: 1, minWidth: 220 }}>
              <label className="lbl">CNPJ</label>
              <input className="inp lg" value={s.cnpj} placeholder="00.000.000/0000-00" inputMode="numeric"
                onChange={(e) => onField('cnpj', e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') validateCnpj(); }} />
            </div>
            <button className="btn-prim" onClick={validateCnpj} disabled={s.cnpjStatus === 'loading'} style={{ height: 46 }}>
              {s.cnpjStatus === 'loading' ? <span className="spin" /> : <span className="ms-icon" style={{ fontSize: 18 }}>search</span>}
              {cnpjBtnLabel}
            </button>
          </div>
          {s.cnpjStatus === 'done' && (
            <div style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 7, font: '500 12.5px var(--font-secondary)', color: '#4ADE80', background: 'rgba(40,167,69,.12)', border: '1px solid rgba(40,167,69,.3)', padding: '7px 12px', borderRadius: 8 }}>
              <span className="ms-icon" style={{ fontSize: 16 }}>verified</span>Dados encontrados na Receita Federal e preenchidos abaixo.
            </div>
          )}
          {(s.cnpjStatus === 'manual' || s.cnpjStatus === 'error') && (
            <div style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 7, font: '500 12.5px var(--font-secondary)', color: 'var(--warning)', background: 'rgba(255,193,7,.1)', border: '1px solid rgba(255,193,7,.35)', padding: '7px 12px', borderRadius: 8 }}>
              <span className="ms-icon" style={{ fontSize: 16 }}>error</span>{s.cnpjErr}
            </div>
          )}
        </div>

        {/* Empresa */}
        <div className="card" style={{ marginBottom: 18 }}>
          <div className="sec-title" style={{ marginBottom: 16 }}>Dados da empresa</div>
          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 14 }}>
            <Field span={2} label="Razão social" required value={s.razaoSocial} onChange={(v) => onField('razaoSocial', v)} placeholder="Nome registrado da empresa" />
            <Field label="Inscrição estadual" optional value={s.inscricaoEstadual} onChange={(v) => onField('inscricaoEstadual', v)} placeholder="Número ou ISENTO" />
            <Field label="CEP" required value={s.cep} onChange={(v) => onField('cep', v)} mask={maskCEP} placeholder="00000-000" inputMode="numeric"
              action={{ icon: 'search', label: 'Buscar endereço pelo CEP', onClick: validateCep, loading: s.cepStatus === 'loading', disabled: !isCEP(s.cep) || s.cepStatus === 'loading' }} />
            <Field span={2} label="Endereço (logradouro)" required value={s.endereco} onChange={(v) => onField('endereco', v)} placeholder="Rua, avenida, etc." />
            <Field label="Número" required value={s.numero} onChange={(v) => onField('numero', v)} placeholder="123" inputMode="numeric" />
            <Field label="Complemento" optional value={s.complemento} onChange={(v) => onField('complemento', v)} placeholder="Sala, andar…" />
            <Field label="Bairro" required value={s.bairro} onChange={(v) => onField('bairro', v)} placeholder="Bairro" />
            <Field label="Cidade" required value={s.cidade} onChange={(v) => onField('cidade', v)} placeholder="Cidade" />
            <Field label="Estado (UF)" required value={s.estado} onChange={(v) => onField('estado', v)} mask={maskUF} placeholder="SP" />
          </div>
        </div>

        {/* Representante */}
        <div className="card">
          <div className="sec-title" style={{ marginBottom: 16 }}>Representante</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14 }}>
            <Field span={2} label="Nome completo" required value={s.repNome} onChange={(v) => onField('repNome', v)} placeholder="Nome do representante" />
            <Field label="Data de nascimento" type="date" value={s.repNascimento} onChange={(v) => onField('repNascimento', v)} />
            <Field label="CPF" optional value={s.repCpf} onChange={(v) => onField('repCpf', v)} mask={maskCPF} placeholder="000.000.000-00" inputMode="numeric" />
            <Field label="E-mail" required type="email" value={s.repEmail} onChange={(v) => onField('repEmail', v)} placeholder="email@empresa.com.br" />
            <Field label="Telefone" required value={s.repTelefone} onChange={(v) => onField('repTelefone', v)} mask={maskPhone} placeholder="(00) 00000-0000" inputMode="tel" />
          </div>
          <label style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 16, cursor: 'pointer', font: '400 13px var(--font-secondary)', color: 'var(--text-secondary)' }}>
            <input type="checkbox" checked={s.repMesmoEndereco} onChange={(e) => patch({ repMesmoEndereco: e.target.checked })} style={{ width: 18, height: 18, accentColor: 'var(--primary)', cursor: 'pointer' }} />
