          </label>
          {!s.repMesmoEndereco && (
            <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--border-light)' }}>
              <Field label="Endereço do representante" required value={s.repEndereco} onChange={(v) => onField('repEndereco', v)} placeholder="Rua, número, bairro, cidade — UF" />
            </div>
          )}
        </div>
      </>
    );
  };

  const renderPagamento = () => {
    const notEdit = !s.editMode;
    return (
      <>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, marginBottom: 22, flexWrap: 'wrap' }}>
          <div>
            <h2 style={{ font: '700 26px var(--font-primary)', letterSpacing: '-.02em', margin: '0 0 6px', color: 'var(--text)' }}>Configuração de pagamento</h2>
            <p style={{ font: '400 14px var(--font-secondary)', color: 'var(--text-muted)', margin: 0 }}>Padrão: entrada + 11 parcelas iguais. Habilite a edição para personalizar.</p>
          </div>
          <EditToggle on={s.editMode} onToggle={toggleEdit} label="Editar valores" />
        </div>

        {/* Entrada */}
        <div className="card" style={{ padding: '20px 22px', marginBottom: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <span className="ms-icon" style={{ fontSize: 18, color: 'var(--primary)' }}>south_east</span>
            <span className="sec-title" style={{ fontSize: 13, letterSpacing: '.06em' }}>Entrada</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr 1fr', gap: 12 }}>
            <div>
              <label className="lbl sm">Valor</label>
              <div style={{ display: 'flex', alignItems: 'center', height: 44, borderRadius: 8, background: 'var(--surface-elevated)', border: '1px solid var(--border-light)', padding: '0 12px', gap: 6, opacity: s.editMode ? 1 : .7 }}>
                <span style={{ font: "600 13px 'Roboto'", color: 'var(--text-muted)' }}>R$</span>
                <MoneyInput className="" value={s.entradaValor} onChangeNumber={setEntradaValor} disabled={notEdit} placeholder="0,00" />
              </div>
            </div>
            <div>
              <label className="lbl sm">Forma de pagamento</label>
              <select className="inp" value={s.entradaForma} onChange={(e) => setEntradaForma(e.target.value)}>
                {PAYMENT_METHODS.map((m) => <option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
            </div>
            <div>
              <label className="lbl sm">Data de pagamento</label>
              <input className="inp" type="date" value={s.entradaData} onChange={(e) => setEntradaData(e.target.value)} />
            </div>
          </div>
        </div>

        {/* Parcelas */}
        <div className="card" style={{ padding: '20px 22px', marginBottom: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span className="ms-icon" style={{ fontSize: 18, color: 'var(--primary)' }}>event_repeat</span>
              <span className="sec-title" style={{ fontSize: 13, letterSpacing: '.06em' }}>Parcelas</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ font: '500 12px var(--font-secondary)', color: 'var(--text-muted)' }}>Quantidade</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 2, background: 'var(--surface-elevated)', border: '1px solid var(--border-light)', borderRadius: 9, padding: 3 }}>
                <button onClick={decParcela} disabled={notEdit} style={{ width: 30, height: 30, borderRadius: 7, border: 'none', background: 'transparent', color: s.editMode ? 'var(--primary)' : 'var(--text-muted)', cursor: s.editMode ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span className="ms-icon" style={{ fontSize: 18 }}>remove</span></button>
                <span style={{ minWidth: 30, textAlign: 'center', font: '700 15px var(--font-primary)', color: 'var(--text)' }}>{s.parcelas.length}</span>
                <button onClick={incParcela} disabled={notEdit} style={{ width: 30, height: 30, borderRadius: 7, border: 'none', background: 'transparent', color: s.editMode ? 'var(--primary)' : 'var(--text-muted)', cursor: s.editMode ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span className="ms-icon" style={{ fontSize: 18 }}>add</span></button>
              </div>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '46px 1.2fr 1fr 1fr 40px', gap: 10, padding: '0 4px 8px', font: '600 10.5px var(--font-primary)', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--text-muted)', borderBottom: '1px solid var(--border-light)' }}>
            <div>Nº</div><div>Valor</div><div>Forma</div><div>Vencimento</div><div></div>
          </div>
          <div style={{ maxHeight: 320, overflowY: 'auto', marginTop: 6 }}>
            {s.parcelas.map((p, i) => (
              <div key={i} style={{ display: 'grid', gridTemplateColumns: '46px 1.2fr 1fr 1fr 40px', gap: 10, alignItems: 'center', padding: '6px 4px', borderBottom: '1px solid rgba(255,255,255,.04)' }}>
                <div style={{ font: '700 13px var(--font-primary)', color: 'var(--primary)', textAlign: 'center' }}>{i + 1}</div>
                <div style={{ display: 'flex', alignItems: 'center', height: 40, borderRadius: 8, background: 'var(--surface-elevated)', border: '1px solid ' + (p.manual ? 'rgba(199,164,68,.45)' : 'var(--border-light)'), padding: '0 10px', gap: 5, opacity: s.editMode ? 1 : .7 }}>
                  <span style={{ font: "600 12px 'Roboto'", color: 'var(--text-muted)' }}>R$</span>
                  <MoneyInput className="" value={p.valor} onChangeNumber={(n) => setParcelaValor(i, n)} disabled={notEdit} placeholder="0,00" />
                </div>
                <select className="inp" style={{ height: 40 }} value={p.forma} onChange={(e) => setParcelaForma(i, e.target.value)} disabled={notEdit}>
                  {PAYMENT_METHODS.map((m) => <option key={m.id} value={m.id}>{m.label}</option>)}
                </select>
                <input className="inp" style={{ height: 40 }} type="date" value={p.data || ''} onChange={(e) => setParcelaData(i, e.target.value)} disabled={notEdit} />
                <button onClick={() => p.manual && unlockParcela(i)} disabled={notEdit || !p.manual} title={p.manual ? 'Valor fixado — clique para voltar ao automático' : 'Valor automático'} style={{ width: 34, height: 34, borderRadius: 8, border: 'none', background: 'transparent', color: p.manual ? 'var(--primary)' : 'var(--text-muted)', cursor: (notEdit || !p.manual) ? 'default' : 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <span className="ms-icon" style={{ fontSize: 18 }}>{p.manual ? 'lock' : 'auto_mode'}</span>
                </button>
              </div>
            ))}
          </div>

          {/* balance */}
          <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 14px', borderRadius: 10, background: balanced ? 'rgba(40,167,69,.1)' : 'rgba(255,193,7,.1)', border: '1px solid ' + (balanced ? 'rgba(40,167,69,.3)' : 'rgba(255,193,7,.35)') }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, font: '500 12.5px var(--font-secondary)', color: balanced ? '#4ADE80' : 'var(--warning)' }}>
              <span className="ms-icon" style={{ fontSize: 17 }}>{balanced ? 'task_alt' : 'error'}</span>
              {balanced ? 'Valores conferem com o total' : ('Diferença de ' + fmt(Math.abs(diff)) + ' em relação ao total')}
              {!balanced && s.editMode && <button className="linkbtn" style={{ marginLeft: 8 }} onClick={resetSchedule}>Redistribuir</button>}
            </div>
            <div style={{ font: "700 14px 'Roboto'", color: balanced ? '#4ADE80' : 'var(--warning)' }}>{fmt(soma)}</div>
          </div>
        </div>

        {/* Destino */}
        <div className="card" style={{ padding: '20px 22px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
            <span className="ms-icon" style={{ fontSize: 18, color: 'var(--primary)' }}>hub</span>
            <span className="sec-title" style={{ fontSize: 13, letterSpacing: '.06em' }}>Destino do cadastro</span>
          </div>
          <p style={{ font: '400 12.5px var(--font-secondary)', color: 'var(--text-muted)', margin: '0 0 14px' }}>Selecione em quais sistemas este cliente será cadastrado.</p>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            {[{ k: 'omie', t: 'Omie', d: 'ERP financeiro e fiscal' }, { k: 'conecta', t: 'Conecta', d: 'Plataforma de gestão' }].map((o) => (
              <label key={o.k} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: 16, borderRadius: 12, cursor: 'pointer', background: s[o.k] ? 'var(--primary-subtle)' : 'var(--surface-elevated)', border: '1.5px solid ' + (s[o.k] ? 'rgba(199,164,68,.4)' : 'var(--border-light)') }}>
                <input type="checkbox" checked={s[o.k]} onChange={(e) => patch({ [o.k]: e.target.checked })} style={{ width: 20, height: 20, accentColor: 'var(--primary)', cursor: 'pointer' }} />
                <div>
                  <div style={{ font: '600 15px var(--font-primary)', color: 'var(--text)' }}>{o.t}</div>
                  <div style={{ font: '400 12px var(--font-secondary)', color: 'var(--text-muted)' }}>{o.d}</div>
                </div>
              </label>
            ))}
          </div>
        </div>
      </>
    );
  };

  const renderResumo = () => {
    const parcelasLabel = s.parcelas.length + (parcelasUniformes ? ('× de ' + fmt(s.parcelas[0] ? s.parcelas[0].valor : 0)) : ' parcelas personalizadas');
    return (
      <>
        <div style={{ marginBottom: 22 }}>
          <h2 style={{ font: '700 26px var(--font-primary)', letterSpacing: '-.02em', margin: '0 0 6px', color: 'var(--text)' }}>Confirme o pedido</h2>
          <p style={{ font: '400 14px var(--font-secondary)', color: 'var(--text-muted)', margin: 0 }}>Revise as informações antes de finalizar o cadastro.</p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div className="card" style={{ padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}><span className="sec-title" style={{ fontSize: 12 }}>Produto</span><button className="linkbtn" onClick={() => goStep(0)}>Editar</button></div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div><div style={{ font: '600 16px var(--font-primary)', color: 'var(--text)' }}>{product.name}</div><div style={{ font: '400 12.5px var(--font-secondary)', color: 'var(--text-muted)', marginTop: 2 }}>{cat.name} · {product.duration}</div></div>
              <div style={{ font: '700 17px var(--font-primary)', color: 'var(--primary)' }}>{fmt(total)}</div>
            </div>
          </div>
          <div className="card" style={{ padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}><span className="sec-title" style={{ fontSize: 12 }}>Empresa & Representante</span><button className="linkbtn" onClick={() => goStep(1)}>Editar</button></div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px 24px' }}>
              {[['Razão social', s.razaoSocial], ['CNPJ', s.cnpj], ['Representante', s.repNome || '—'], ['Contato', (s.repEmail || '—') + (s.repTelefone ? ' · ' + s.repTelefone : '')]].map(([k, v]) => (
                <div key={k}><div style={{ font: '400 11px var(--font-secondary)', color: 'var(--text-muted)' }}>{k}</div><div style={{ font: '500 13.5px var(--font-secondary)', color: 'var(--text)', marginTop: 2 }}>{v}</div></div>
              ))}
            </div>
          </div>
          <div className="card" style={{ padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}><span className="sec-title" style={{ fontSize: 12 }}>Pagamento</span><button className="linkbtn" onClick={() => goStep(2)}>Editar</button></div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid var(--border-light)' }}><span style={{ font: '500 13px var(--font-secondary)', color: 'var(--text-secondary)' }}>Entrada · {paymentLabel(s.entradaForma)}</span><span style={{ font: "600 13.5px 'Roboto'", color: 'var(--text)' }}>{fmt(s.entradaValor)}</span></div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid var(--border-light)' }}><span style={{ font: '500 13px var(--font-secondary)', color: 'var(--text-secondary)' }}>{parcelasLabel}</span><span style={{ font: "600 13.5px 'Roboto'", color: 'var(--text)' }}>{fmt(parcelasSum)}</span></div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 0 0' }}><span style={{ font: '600 14px var(--font-primary)', color: 'var(--text)' }}>Total</span><span style={{ font: '700 16px var(--font-primary)', color: 'var(--primary)' }}>{fmt(soma)}</span></div>
          </div>
          <div className="card" style={{ padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}><span className="sec-title" style={{ fontSize: 12 }}>Destino do cadastro</span><div style={{ display: 'flex', gap: 8 }}>{destinoChips.map((c) => <span key={c} className="chip"><span className="ms-icon" style={{ fontSize: 13 }}>check</span>{c}</span>)}</div></div>
          </div>

          {/* ===== Cobrança Pix da entrada ===== */}
          {s.entradaForma === 'pix' && s.pixState !== 'idle' && (
            <div className="card" style={{ padding: 22 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, gap: 12, flexWrap: 'wrap' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span className="ms-icon" style={{ fontSize: 20, color: 'var(--primary)' }}>pix</span>
                  <span className="sec-title" style={{ fontSize: 13, letterSpacing: '.06em' }}>Pagamento da entrada · Pix</span>
                </div>
                <span style={{ font: "700 15px 'Roboto'", color: 'var(--text)' }}>{fmt(s.entradaValor)}</span>
              </div>

              {s.pixState === 'generating' && (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, padding: '24px 0' }}>
                  <span style={{ width: 20, height: 20, borderRadius: '50%', border: '2px solid rgba(199,164,68,.3)', borderTopColor: 'var(--primary)', display: 'inline-block', animation: 'spin .8s linear infinite' }} />
                  <span style={{ font: '500 14px var(--font-secondary)', color: 'var(--text-secondary)' }}>Gerando código Pix…</span>
                </div>
              )}

              {s.pixState === 'awaiting' && (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
                  {s.pixQrImg ? (
                    <div style={{ background: '#fff', padding: 12, borderRadius: 12, lineHeight: 0 }}>
                      <img src={s.pixQrImg} alt="QR Code Pix" style={{ width: 210, height: 210, display: 'block' }} />
                    </div>
                  ) : (
                    <div style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-muted)' }}>Use o código copia e cola abaixo.</div>
                  )}
                  <div style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-muted)', textAlign: 'center' }}>Abra o app do banco, escolha <strong style={{ color: 'var(--text-secondary)' }}>Pix &gt; Pagar com QR Code</strong>, ou use o copia e cola.</div>
                  {s.pixCopiaCola && (
                    <div style={{ width: '100%', display: 'flex', gap: 8, alignItems: 'stretch' }}>
                      <div style={{ flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', font: "400 12px 'Roboto'", color: 'var(--text-secondary)', background: 'var(--surface-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, padding: '0 12px', lineHeight: '40px' }}>{s.pixCopiaCola}</div>
                      <button onClick={copyPix} className="btn-ghost" style={{ height: 40, padding: '0 14px' }}>
                        <span className="ms-icon" style={{ fontSize: 17 }}>{s.pixCopied ? 'check' : 'content_copy'}</span>{s.pixCopied ? 'Copiado' : 'Copiar'}
                      </button>
                    </div>
                  )}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 4 }}>
                    <span style={{ width: 16, height: 16, borderRadius: '50%', border: '2px solid rgba(199,164,68,.3)', borderTopColor: 'var(--primary)', display: 'inline-block', animation: 'spin .8s linear infinite' }} />
                    <span style={{ font: '500 13px var(--font-secondary)', color: 'var(--text-secondary)' }}>Aguardando pagamento…</span>
                  </div>
                  <div style={{ display: 'flex', gap: 16 }}>
                    <button onClick={checkPixNow} className="linkbtn">Verificar agora</button>
                    <button onClick={cancelPix} className="linkbtn" style={{ color: 'var(--text-muted)' }}>Cancelar</button>
                  </div>
                </div>
              )}

              {s.pixState === 'paid' && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0' }}>
                  <span className="ms-icon" style={{ fontSize: 26, color: '#4ADE80' }}>check_circle</span>
                  <div>
                    <div style={{ font: '600 15px var(--font-primary)', color: 'var(--text)' }}>Pagamento confirmado!</div>
                    <div style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-muted)' }}>Clique em <strong>Finalizar cadastro</strong> para concluir.</div>
                  </div>
                </div>
              )}

              {s.pixState === 'error' && (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span className="ms-icon" style={{ fontSize: 22, color: 'var(--danger)' }}>error</span>
                    <span style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-secondary)' }}>{s.pixErr}</span>
                  </div>
                  <button onClick={generatePix} className="btn-ghost" style={{ height: 40 }}><span className="ms-icon" style={{ fontSize: 17 }}>refresh</span>Tentar novamente</button>
                </div>
              )}
            </div>
          )}

          {s.sendState === 'error' && (
            <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', padding: '14px 16px', borderRadius: 12, background: 'rgba(220,53,69,.1)', border: '1px solid rgba(220,53,69,.35)' }} role="alert">
              <span className="ms-icon" style={{ fontSize: 20, color: 'var(--danger)' }}>error</span>
              <div style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-secondary)' }}>
                <strong style={{ color: 'var(--text)', display: 'block' }}>{s.sendErrHandled ? 'Não foi possível enviar.' : 'Não conseguimos enviar.'}</strong>
                {s.sendErrHandled ? s.sendErr : `${s.sendErr} Verifique a conexão e tente novamente.`}
              </div>
            </div>
          )}
        </div>
      </>
    );
  };

  const renderSummary = () => (
    <div className="sticky">
      <div style={{ background: 'var(--surface-elevated)', border: '1px solid var(--border-light)', borderRadius: 16, overflow: 'hidden', position: 'relative' }}>
        <div style={{ position: 'absolute', top: 0, left: '10%', right: '10%', height: 1, background: 'linear-gradient(90deg,transparent,rgba(199,164,68,.45),transparent)' }} />
        <div style={{ padding: '18px 20px', borderBottom: '1px solid var(--border-light)' }}>
          <div style={{ font: '600 11px var(--font-primary)', letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--primary)' }}>Resumo do pedido</div>
        </div>
        <div style={{ padding: 20 }}>
          {product ? (
            <>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 18 }}>
                <div style={{ width: 42, height: 42, borderRadius: 12, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: colors.iconBg, color: colors.iconFg }}><span className="ms-icon" style={{ fontSize: 22 }}>{product.icon}</span></div>
                <div style={{ minWidth: 0 }}><div style={{ font: '600 14.5px var(--font-primary)', color: 'var(--text)', lineHeight: 1.3 }}>{product.name}</div><div style={{ font: '400 12px var(--font-secondary)', color: 'var(--text-muted)', marginTop: 3 }}>{cat.name}</div></div>
              </div>
              {[['Valor total', fmt(soma)], ['Entrada', fmt(s.entradaValor)], ['Parcelas', s.parcelas.length + (parcelasUniformes ? '× ' + fmt(s.parcelas[0] ? s.parcelas[0].valor : 0) : ' (variadas)')]].map(([k, v]) => (
                <div key={k} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '9px 0', borderTop: '1px solid var(--border-light)' }}><span style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-secondary)' }}>{k}</span><span style={{ font: "600 13.5px 'Roboto'", color: 'var(--text)' }}>{v}</span></div>
              ))}
              <div style={{ marginTop: 16, paddingTop: 14, borderTop: '1px solid var(--border)' }}>
                <div style={{ font: '400 11px var(--font-primary)', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: 8 }}>Destino</div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>{destinoChips.length ? destinoChips.map((c) => <span key={c} className="chip"><span className="ms-icon" style={{ fontSize: 13 }}>check</span>{c}</span>) : <span style={{ font: '400 12px var(--font-secondary)', color: 'var(--text-muted)' }}>—</span>}</div>
              </div>
            </>
          ) : (
            <div style={{ textAlign: 'center', padding: '24px 8px' }}>
              <span className="ms-icon" style={{ fontSize: 38, color: 'var(--text-muted)', opacity: .5 }}>shopping_bag</span>
              <div style={{ font: '400 13px var(--font-secondary)', color: 'var(--text-muted)', marginTop: 10 }}>Selecione um produto para montar o pedido.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  // ----- Botão primário por etapa -----
  let primaryLabel = 'Continuar', primaryIcon = 'arrow_forward', primaryAction = next, enabled = true;
  if (s.step === 0) enabled = !!product;
  else if (s.step === 1) enabled = empresaValid;
  else if (s.step === 2) { primaryLabel = 'Revisar pedido'; enabled = pagamentoValid; }
  else {
    // Etapa Resumo: se a entrada é Pix, é preciso gerar o QR e confirmar o pagamento
    // antes de liberar "Finalizar cadastro".
    const isPix = s.entradaForma === 'pix';
    if (isPix && s.pixState !== 'paid') {
      primaryIcon = 'qr_code_2';
      if (s.pixState === 'generating') { primaryLabel = 'Gerando código Pix…'; primaryAction = () => {}; enabled = false; }
      else if (s.pixState === 'awaiting') { primaryLabel = 'Aguardando pagamento…'; primaryAction = () => {}; enabled = false; }
      else { primaryLabel = 'Gerar código Pix'; primaryAction = generatePix; enabled = pagamentoValid; }
    } else {
      primaryLabel = sending ? 'Enviando…' : 'Finalizar cadastro'; primaryIcon = 'check'; primaryAction = finalize; enabled = pagamentoValid && !sending;
    }
  }
  const primaryBusy = s.step === 3 && (sending || s.pixState === 'generating' || s.pixState === 'awaiting');

  /* ======================= RENDER ======================= */
  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--background)', color: 'var(--text)' }}>
      {/* Sem header em nenhuma tela — navegação pelo stepper e pelos botões de Voltar. */}

      {/* STEPPER */}
      {s.screen === 'flow' && renderStepper()}

      {/* SCROLL AREA */}
      <div className="scrollarea" ref={scrollRef}>
        {s.screen === 'lobby' && renderLobby()}

        {s.screen === 'flow' && (
          <div className="flow-grid">
            <div style={{ minWidth: 0 }}>
              {s.step === 0 && renderProduto()}
              {s.step === 1 && renderEmpresa()}
              {s.step === 2 && renderPagamento()}
              {s.step === 3 && renderResumo()}

              {/* NAV */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 26 }}>
                <button className="btn-ghost" onClick={back} disabled={sending}><span className="ms-icon" style={{ fontSize: 18 }}>arrow_back</span>{s.step === 0 ? 'Voltar ao lobby' : 'Voltar'}</button>
                <button className="btn-prim" onClick={primaryAction} disabled={!enabled}>
                  {primaryBusy ? <span className="spin" /> : null}
                  {primaryLabel}{!primaryBusy && <span className="ms-icon" style={{ fontSize: 18 }}>{primaryIcon}</span>}
                </button>
              </div>
            </div>
            {renderSummary()}
          </div>
        )}

        {s.screen === 'success' && (
          <div style={{ maxWidth: 600, margin: '0 auto', padding: '64px 28px', textAlign: 'center' }}>
            <div style={{ width: 88, height: 88, borderRadius: '50%', margin: '0 auto 28px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(40,167,69,.12)', border: '1.5px solid rgba(40,167,69,.4)', animation: 'popIn .4s both' }}>
              <span className="ms-icon" style={{ fontSize: 48, color: '#4ADE80' }}>check_circle</span>
            </div>
            <h1 style={{ font: '700 30px var(--font-primary)', letterSpacing: '-.02em', margin: '0 0 10px', color: 'var(--text)' }}>Cadastro enviado!</h1>
            <p style={{ font: '400 15px/1.6 var(--font-secondary)', color: 'var(--text-secondary)', margin: '0 0 28px' }}>
              {product ? product.name : ''} contratado para <strong style={{ color: 'var(--text)' }}>{s.razaoSocial}</strong>.<br />
              O cliente foi enviado para {destinoText}.
            </p>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, padding: '12px 20px', borderRadius: 12, background: 'var(--surface-elevated)', border: '1px solid var(--border-light)', marginBottom: 32 }}>
              <span style={{ font: '400 12px var(--font-primary)', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>Protocolo</span>
              <span style={{ font: "700 15px 'Roboto'", color: 'var(--primary)', letterSpacing: '.04em' }}>{s.protocol}</span>
            </div>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
              <button className="btn-prim" onClick={restart}>Novo cadastro<span className="ms-icon" style={{ fontSize: 18 }}>add</span></button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
